{% extends 'base.html' %}
{% block title %}Quiz Result - {{ document.title }}{% endblock %}

{% block content %}

<div class="max-w-md mx-auto bg-white dark:bg-slate-800 border border-gray-100 dark:border-slate-700 shadow-sm rounded-2xl p-8 sm:p-10 text-center mt-10 transition-colors">
    <div class="mx-auto w-20 h-20 bg-teal-50 dark:bg-teal-900/30 rounded-full flex items-center justify-center mb-6 shadow-inner border border-teal-100 dark:border-teal-800/50">
        <ion-icon name="trophy-outline" class="text-4xl text-teal-500 dark:text-teal-400"></ion-icon>
    </div>

    <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-200 tracking-tight mb-2">
        Quiz Complete!
    </h2>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-8">{{ document.title }}</p>

    <div class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-slate-900/50 dark:to-slate-800/50 rounded-2xl py-8 px-4 mb-8 border border-gray-200 dark:border-slate-700 shadow-inner">
        <p class="text-gray-500 dark:text-gray-400 text-sm font-medium mb-1 uppercase tracking-wider">Your Score</p>
        <div class="flex items-baseline justify-center gap-1">
            <span class="text-6xl font-black text-teal-600 dark:text-teal-400 tracking-tighter">{{ score }}</span>
            <span class="text-2xl font-bold text-gray-400 dark:text-gray-500">/{{ total }}</span>
        </div>
        <p class="text-sm text-indigo-400 dark:text-indigo-300 mt-3 font-medium">Keep up the great learning!</p>
    </div>

    <div class="flex flex-col gap-3">
        <a href="{% url 'quiz' document.id %}"
           class="w-full bg-gradient-to-r from-teal-500 to-indigo-600 hover:from-teal-600 hover:to-indigo-700 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-indigo-200 dark:shadow-none transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
           <ion-icon name="refresh-outline" class="text-lg"></ion-icon> Retake Quiz
        </a>

        <a href="{% url 'dashboard' %}"
           class="w-full bg-white dark:bg-slate-700 border border-gray-200 dark:border-slate-600 text-gray-700 dark:text-gray-200 font-medium py-3 rounded-xl hover:border-indigo-300 dark:hover:border-indigo-500 hover:text-indigo-600 dark:hover:text-indigo-400 transition shadow-sm flex items-center justify-center gap-2">
           <ion-icon name="grid-outline"></ion-icon> Back to Dashboard
        </a>
    </div>

</div>

{% endblock %}
