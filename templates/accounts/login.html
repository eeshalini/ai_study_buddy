{% extends 'base.html' %}

{% block title %}Login - AI Study Buddy{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center p-4">

    <div
        class="w-full max-w-md bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700 p-8 sm:p-10 transition-colors">

        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-teal-700 dark:text-teal-400 tracking-tight">Welcome Back</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Please enter your details to sign in.</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Username</label>
                <input type="text" name="username" placeholder="Enter your username"
                    class="w-full px-4 py-3 bg-white/50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:focus:ring-indigo-500 dark:focus:border-indigo-500 focus:outline-none transition-all placeholder-gray-400 dark:placeholder-gray-500 text-gray-900 dark:text-white"
                    required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Password</label>
                <input type="password" name="password" placeholder="••••••••"
                    class="w-full px-4 py-3 bg-white/50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:focus:ring-indigo-500 dark:focus:border-indigo-500 focus:outline-none transition-all placeholder-gray-400 dark:placeholder-gray-500 text-gray-900 dark:text-white"
                    required>
                <div class="flex justify-end mt-2">
                    <a href="#"
                        class="text-sm font-medium text-indigo-600 hover:text-indigo-800 transition-colors">Forgot
                        Password?</a>
                </div>
            </div>

            <button type="submit"
                class="w-full mt-2 bg-gradient-to-r from-teal-500 to-indigo-600 hover:from-teal-600 hover:to-indigo-700 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-indigo-200 dark:shadow-none transform hover:-translate-y-0.5">
                Sign In
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400">
            Don't have an account?
            <a href="{% url 'register' %}"
                class="text-indigo-600 dark:text-indigo-400 font-semibold hover:text-indigo-700 dark:hover:text-indigo-300 hover:underline transition-colors">
                Create an account
            </a>
        </p>
    </div>
</div>
{% endblock %}
